polymarket:
  clob_url: "https://clob.polymarket.com"
  gamma_url: "https://gamma-api.polymarket.com"
  ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  chain_id: 137  # Polygon mainnet

ai:
  provider: "claude"  # "claude" | "openai" | "ensemble"
  claude_model: "claude-sonnet-4-6"
  openai_model: "gpt-4o"
  ensemble: false
  temperature: 0.2
  max_analysis_cost_per_day: 5.00
  research_model: "claude-sonnet-4-6"         # Deep analysis + web search for outside info
  compute_model: "claude-haiku-4-5-20251001"  # Fast + cheap for number crunching

risk:
  max_position_pct: 0.10
  max_exposure_pct: 0.50
  max_positions: 10
  drawdown_circuit_breaker: 0.25
  kelly_fraction: 0.25
  min_edge_threshold: 0.10   # Raised from 0.05 — LLM needs >10% to be actionable
  min_confidence: 0.65       # Raised from 0.60
  max_trades_per_day: 20
  daily_loss_limit_pct: 0.15
  confirm_trades: true
  categories_blacklist:
    - "meme"
    - "celebrity"
    - "entertainment"
  min_liquidity: 1000
  min_time_to_resolution_hours: 24

strategies:
  cheap_hunter:
    enabled: false    # Disabled — heuristic boosts generate false positives
    max_price: 0.15
    min_volume: 500
    min_ev: 0.02
  edge_finder:
    enabled: true
    min_edge: 0.10    # Raised from 0.05 — LLM needs >10% disagreement to be actionable
    use_ai: true
    use_news: true
  crypto_sniper:
    enabled: true
    min_edge: 0.08                 # 8% edge minimum
    min_price_move_pct: 0.002      # 0.2% minimum crypto price move
    max_seconds_before_entry: 90   # Enter in last 90 seconds of window
    symbols: ["btcusdt", "ethusdt", "solusdt"]
    max_position_per_trade: 0.05   # 5% of bankroll per snipe ($10 on $200)
    min_liquidity: 500
  weather_sniper:
    enabled: true
    min_edge: 0.10                 # 10% edge minimum
    min_confidence: 0.60           # Ensemble confidence threshold
    min_neg_risk_edge: 0.03        # 3% for neg-risk arb on multi-bucket events
    max_position_per_trade: 0.08   # 8% of bankroll per weather trade ($16 on $200)
    min_liquidity: 200
    forecast_interval_minutes: 30
    locations: ["nyc", "london", "seoul", "chicago", "miami"]
  market_maker:
    enabled: false
    min_spread: 0.05
    max_inventory_pct: 0.20
    requote_threshold: 0.02

agent:
  mode: "copilot"  # "autopilot" | "copilot" | "signals"
  scan_interval_minutes: 5
  sync_interval_minutes: 15  # Re-fetch all markets from API every 15 min
  max_markets_per_scan: 10   # Reduced from 20 — fewer but better candidates
  reanalyze_price_change_pct: 0.05
